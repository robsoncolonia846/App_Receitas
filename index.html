<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#e66238" />
    <link rel="manifest" href="manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="home-layout.css" />
    <title>App Receitas</title>
  </head>
  <body data-page="home" class="home-v2">
    <div class="bg-orb bg-orb-a"></div>
    <div class="bg-orb bg-orb-b"></div>

    <main class="layout-shell">
      <header class="topbar reveal" style="--d: 0.05s">
        <div class="brand-block">
          <span class="brand-dot"></span>
          <div>
            <p class="brand-kicker">Caderno Digital</p>
            <h1 class="brand-title">Receitas da Casa</h1>
            <p class="brand-signature">
              <button
                id="owner-signature-trigger"
                type="button"
                class="brand-signature-btn"
                aria-controls="owner-signature-editor"
                aria-expanded="false"
                title="Clique para editar nome, tamanho e fonte"
              >
                <span id="owner-signature-name">Tamara Blatz</span>
              </button>
            </p>
            <div id="owner-signature-editor" class="signature-editor" hidden>
              <label>
                Nome
                <input id="owner-signature-input" type="text" maxlength="48" placeholder="Nome do dono da receita" />
              </label>
              <div class="signature-editor-grid">
                <label>
                  Tamanho
                  <input id="owner-signature-size" type="range" min="16" max="46" step="1" />
                </label>
                <label>
                  Fonte
                  <select id="owner-signature-font">
                    <option value="caveat">Caveat (assinatura)</option>
                    <option value="fraunces">Fraunces (serifada)</option>
                    <option value="manrope">Manrope (limpa)</option>
                    <option value="georgia">Georgia (classica)</option>
                    <option value="segoe">Segoe UI (moderna)</option>
                  </select>
                </label>
              </div>
              <p id="owner-signature-size-label" class="signature-size-label">22px</p>
              <div class="signature-editor-actions">
                <button id="owner-signature-save-btn" type="button" class="btn btn-solid">Salvar alteracoes</button>
                <button id="owner-signature-cancel-btn" type="button" class="btn btn-soft">Fechar</button>
              </div>
            </div>
          </div>
        </div>

        <nav class="top-actions">
          <a class="btn btn-quiet" href="products.html">Cadastrar receitas</a>
        </nav>
      </header>

      <section class="hero-panel reveal" style="--d: 0.11s">
        <article class="hero-copy">
          <h2>Seu caderno de receitas</h2>

          <div id="home-metric-filters" class="hero-metrics">
            <button class="metric-filter-btn is-active" type="button" data-home-filter="all" aria-pressed="true">
              <strong id="metric-total">0</strong>
              <span>Todas Receitas</span>
            </button>
            <button class="metric-filter-btn" type="button" data-home-filter="cafes" aria-pressed="false">
              <strong id="metric-cafes">0</strong>
              <span>Cafés</span>
            </button>
            <button class="metric-filter-btn" type="button" data-home-filter="favorites" aria-pressed="false">
              <strong id="metric-favorites">0</strong>
              <span>Favoritas</span>
            </button>
            <button class="metric-filter-btn" type="button" data-home-filter="lanches" aria-pressed="false">
              <strong id="metric-lanches">0</strong>
              <span>Lanches</span>
            </button>
            <button class="metric-filter-btn" type="button" data-home-filter="recent" aria-pressed="false">
              <strong id="metric-recent">0</strong>
              <span>Últimas atualizações</span>
            </button>
            <button class="metric-filter-btn" type="button" data-home-filter="tortas" aria-pressed="false">
              <strong id="metric-tortas">0</strong>
              <span>Tortas</span>
            </button>
            <button class="metric-filter-btn metric-filter-jantar" type="button" data-home-filter="jantares" aria-pressed="false">
              <strong id="metric-jantares">0</strong>
              <span>Jantar</span>
            </button>
            <button class="metric-filter-btn metric-filter-doces" type="button" data-home-filter="doces" aria-pressed="false">
              <strong id="metric-doces">0</strong>
              <span>Doces</span>
            </button>
          </div>
        </article>

        <section class="quick-panel-wrap">
          <form id="quick-recipe-form" class="quick-panel" autocomplete="off">
            <h3>Cadastro rapido</h3>
            <label>
              Nome da receita
              <input id="quick-title" name="title" type="text" maxlength="120" placeholder="Ex.: Nhoque de batata" required />
            </label>

            <div class="quick-row">
              <label>
                Categoria
                <input id="quick-category" name="category" type="text" maxlength="60" placeholder="Ex.: Massas" />
              </label>
              <label>
                Tempo (min)
                <input id="quick-prep-minutes" name="prep-minutes" type="number" min="1" max="1440" placeholder="35" />
              </label>
            </div>

            <details class="quick-details">
              <summary>Adicionar ingredientes e preparo</summary>
              <label>
                Ingredientes (1 por linha)
                <textarea
                  id="quick-ingredients"
                  name="ingredients"
                  rows="3"
                  maxlength="2500"
                  placeholder="Batata, farinha, molho"
                ></textarea>
              </label>
              <label>
                Modo de preparo (1 passo por linha)
                <textarea
                  id="quick-steps"
                  name="steps"
                  rows="4"
                  maxlength="4000"
                  placeholder="Cozinhe a batata e amasse"
                ></textarea>
              </label>
            </details>

            <div class="form-actions">
              <button id="quick-save-btn" type="submit" class="btn btn-solid">Salvar receita</button>
              <button id="quick-clear-btn" type="button" class="btn btn-soft">Limpar</button>
            </div>
          </form>
        </section>
      </section>

      <section class="home-toolbar reveal" style="--d: 0.16s">
        <div id="home-quick-filters" class="chip-row">
          <button class="chip is-active" type="button" data-home-filter="all">Todas</button>
          <button class="chip" type="button" data-home-filter="cafes">Cafés</button>
          <button class="chip" type="button" data-home-filter="favorites">Favoritas</button>
          <button class="chip" type="button" data-home-filter="lanches">Lanches</button>
          <button class="chip" type="button" data-home-filter="recent">Últimas atualizações</button>
          <button class="chip" type="button" data-home-filter="tortas">Tortas</button>
          <button class="chip" type="button" data-home-filter="jantares">Jantares</button>
          <button class="chip" type="button" data-home-filter="doces">Doces</button>
        </div>
        <small id="home-stats" class="small-muted"></small>
      </section>

      <section class="card home-list-card reveal" style="--d: 0.21s">
        <form id="home-filters-form" class="grid-form compact-form filters-grid" novalidate>
          <label>
            Buscar
            <input id="home-search" type="search" placeholder="Nome, categoria, tag ou ingrediente" autocomplete="off" />
          </label>
          <label>
            Categoria
            <select id="home-category-filter">
              <option value="">Todas as categorias</option>
            </select>
          </label>
          <label>
            Ordenar
            <select id="home-sort">
              <option value="updated">Atualizadas recentemente</option>
              <option value="name">Nome (A-Z)</option>
              <option value="prep">Menor tempo de preparo</option>
              <option value="cooked">Ultimas preparadas</option>
              <option value="favorites">Favoritas primeiro</option>
            </select>
          </label>
          <label class="inline-check home-inline-check">
            <input id="home-favorite-only" type="checkbox" />
            Mostrar somente favoritas
          </label>
          <div class="form-actions">
            <button id="clear-filters-btn" type="button" class="btn btn-soft">Limpar filtros</button>
          </div>
        </form>

        <ul id="home-recipes-list" class="recipe-list home-recipe-list"></ul>
      </section>

      <section class="home-bottom-tools reveal" style="--d: 0.27s">
        <small id="sync-status" class="small-muted">Backup e restauracao da base de receitas</small>
        <div class="home-bottom-actions">
          <button id="import-json-btn" type="button" class="btn btn-quiet">Importar JSON</button>
          <button id="export-json-btn" type="button" class="btn btn-quiet">Exportar JSON</button>
        </div>
      </section>
    </main>

    <input id="json-file-input" type="file" accept=".json,application/json,text/plain" hidden />

    <script src="db.js"></script>
    <script src="app.js"></script>
  </body>
</html>
