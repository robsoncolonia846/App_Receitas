<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d9488" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="styles.css" />
    <title>Cadastrar Receitas</title>
  </head>
  <body data-page="catalog">
    <main class="app">
      <header class="hero">
        <h1>Cadastrar Receitas</h1>
        <p>Cadastre, edite e organize as receitas em um unico lugar.</p>
        <nav class="top-nav">
          <a class="nav-link" href="index.html">Inicio</a>
          <a class="nav-link is-active" href="products.html">Cadastrar</a>
          <a class="nav-link" href="history.html">Historico</a>
          <button id="import-json-btn" type="button" class="sync-btn">Importar JSON</button>
          <button id="export-json-btn" type="button" class="sync-btn">Exportar JSON</button>
        </nav>
      </header>

      <section class="card sync-card">
        <small id="sync-status"></small>
      </section>

      <section class="card">
        <h2 id="catalog-form-title">Cadastro completo</h2>
        <small class="small-muted">Se quiser editar uma receita, clique em "Editar" na lista abaixo.</small>

        <form id="recipe-form" class="grid-form">
          <input id="recipe-id" type="hidden" />
          <label>
            Titulo da receita
            <input id="recipe-title" type="text" maxlength="120" placeholder="Ex.: Bolo de cenoura" required />
          </label>
          <label>
            Categoria
            <input id="recipe-category" type="text" maxlength="60" placeholder="Ex.: Sobremesas" />
          </label>
          <label>
            Tempo de preparo (min)
            <input id="recipe-prep-minutes" type="number" min="1" max="1440" placeholder="Ex.: 50" />
          </label>
          <label>
            Porcoes
            <input id="recipe-servings" type="number" min="1" max="100" placeholder="Ex.: 8" />
          </label>
          <label>
            Dificuldade
            <select id="recipe-difficulty">
              <option value="">Nao informar</option>
              <option value="Facil">Facil</option>
              <option value="Media">Media</option>
              <option value="Avancada">Avancada</option>
            </select>
          </label>
          <label>
            Tags (separadas por virgula)
            <input id="recipe-tags" type="text" maxlength="250" placeholder="Ex.: domingo, rapido, forno" />
          </label>
          <label>
            Ingredientes (1 por linha)
            <textarea
              id="recipe-ingredients"
              rows="6"
              maxlength="4000"
              placeholder="Ex.: 2 xicaras de farinha"
            ></textarea>
          </label>
          <label>
            Modo de preparo (1 passo por linha)
            <textarea
              id="recipe-steps"
              rows="7"
              maxlength="6000"
              placeholder="Ex.: Misture todos os ingredientes secos"
            ></textarea>
          </label>
          <label>
            Observacoes
            <textarea id="recipe-notes" rows="4" maxlength="2000" placeholder="Dicas para sua esposa lembrar"></textarea>
          </label>
          <label class="inline-check">
            <input id="recipe-favorite" type="checkbox" />
            Marcar como favorita
          </label>
          <div class="form-actions">
            <button id="recipe-save-btn" type="submit">Salvar receita</button>
            <button id="recipe-form-reset-btn" type="button" class="ghost-btn">Novo cadastro</button>
          </div>
        </form>
      </section>

      <section class="card">
        <div class="section-row">
          <h2>Receitas cadastradas</h2>
          <small id="catalog-stats" class="small-muted"></small>
        </div>

        <label>
          Buscar receita
          <input id="catalog-search" type="search" placeholder="Digite nome, categoria ou tag" autocomplete="off" />
        </label>

        <ul id="catalog-recipes-list" class="recipe-list"></ul>
      </section>
    </main>

    <input id="json-file-input" type="file" accept=".json,application/json,text/plain" hidden />

    <script src="db.js"></script>
    <script src="app.js"></script>
  </body>
</html>
